services:
  - type: web
    name: visionaid-a11y-audit
    runtime: python
    buildCommand: poetry install --no-root
    startCommand: python entry_points/api_server.py --host 0.0.0.0
    envVars:
      - key: PORT
        generateValue: false        # Render injects this automatically
      - key: ANTHROPIC_API_KEY
        sync: false                 # Set this in the Render dashboard (optional —
                                    # users can also supply their own key in the form)
